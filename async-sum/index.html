<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Async Sum</title>
</head>
<body>
<script>

    function asyncAdd(a, b, callback) {
        setTimeout(function () {
            callback(a + b, null);
        }, 1000);
    }

    // 包一層 Promise，方便 async / await 編排
    function add(a, b) {
        return new Promise(function(resolve, reject) {
            asyncAdd(a, b, function (res, err) {
                if(err) {
                    reject(err);
                }
                resolve(res);
            })
        })
    }

    // 非同步 sum：並行分治版本
    async function asyncSum(nums) {
        if(!Array.isArray(nums) || nums.length === 0) {
            return 0;
        }

        let queue = [...nums];

        while(queue.length > 1) {
            const task = [];

            for(let i = 0; i < queue.length; i+=2) {
                if(i + 1 < queue.length) {
                    task.push(add(queue[i], queue[i + 1]));
                } else {
                    // 奇數個元素時，最後一個直接進下一輪
                    task.push(Promise.resolve(queue[i]));
                }
            }

            queue = await Promise.all(task);
        }

        return queue[0];
    }

    async function runTests() {
        const cases = [
            { input: [1, 2, 3, 4, 5], expect: 15 },
            { input: [10], expect: 10 },
            { input: [], expect: 0 },
            { input: [1, -2, 3], expect: 2 },
            { input: [100, 200, 300, 400], expect: 1000 },
        ];

        for (let i = 0; i < cases.length; i++) {
            const item = cases[i];
            const result = await asyncSum(item.input);
            const pass = result === item.expect;

            console.log(
                pass ? '✅' : '❌',
                'input =',
                item.input,
                'result =',
                result,
                'expect =',
                item.expect
            );
        }
    }

    runTests();
</script>
</body>
</html>
