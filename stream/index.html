<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Stream</title>
</head>
<body>
<div id="app"></div>

<script>

    class Stream {
        constructor(container) {
            this.contianer = container;
            this.pending = '';
            this.prev = '';
            this.running = false;
        }

        append(chunk) {
            this.pending += chunk;

            if (this.running) {
                return;
            }

            this.running = true;

            requestAnimationFrame(() => {
                this.running = false;

                const text = this.prev + this.pending;

                this.pending = '';

                const parts = text.split('\n\n');
                this.prev = text.endsWith('\n\m') ? '' : parts.pop();
                this.render(parts);
            })
        }

        render(parts) {
            const fragment = document.createDocumentFragment();

            for(let i = 0; i < parts.length; i++) {
                const p = parts[i];
                const el = document.createElement('p');
                el.textContent = p.replace('\n/g', ' ')
                fragment.append(el);
            }

            this.contianer.append(fragment);
        }
    }

    const container = document.getElementById('app');
    const renderer = new Stream(container);

    const events = [
        {type: 'token', content: 'Hello'},
        {type: 'token', content: ' world\n\nHow are'},
        {type: 'token', content: ' you?\n\nI am fine'},
        {type: 'token', content: ' too\n\n'},
        {type: 'done'}
    ];

    let index = 0;

    // 使用 setInterval 每 500ms 模擬一次流式數據到達
    const timer = setInterval(() => {
        const event = events[index++];

        // 1. 處理結束邏輯
        if (!event || event.type === 'done') {
            clearInterval(timer);
            console.log('Stream Done. 殘留文字:', renderer.rest);
            return;
        }

        // 2. 模擬接收到 Token 並調用 Stream 實例的 append 方法
        console.log('Receiving:', event.content);
        renderer.append(event.content);

    }, 500);
</script>
</body>
</html>
