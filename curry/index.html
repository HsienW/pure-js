    // part4 如果數字相加且參數不固定
    const addTwo = function () {
        let args = [];

        function subAdd() {
            if (arguments.length === 0) {
                let total = args.reduce((prev, cur) => {
                    return prev + cur;
                });

                args.length = 0;
                return total
            }

            args.push(...arguments);
            return subAdd;
        }

        return subAdd;
    }


    function curry(fn) {
        return function curried(...args) {
            const self = this;

            if(fn.length <= args.length) {
                return fn.apply(self, args);
            }

            return function (...next) {
                return curried.apply(self, args.concat(next));
            }
        }
    }

    function createUrl(base, path, query) {
        return `${base}/${path}?${query}`
    }

    const initUrl = curry(createUrl);

    const setBaseUrl = initUrl('https://123.com');
    const userApi = setBaseUrl('user/pageInfo');
    const bizApi = setBaseUrl('biz/commonInfo');

    const pageApi = userApi('page=8822222');

    console.log('test =>>>>', pageApi);

    const add = (a, b, c) => a + b + c;
    const curriedAdd = curry(add);

    // 1. 標準調用
    console.log(curriedAdd(1)(2)(3)); // 6

    // 2. 批量參數調用
    console.log(curriedAdd(1, 2)(3)); // 6

    // 3. 參數溢出測試 (測試 >= 的重要性)
    console.log(curriedAdd(1, 2, 3, 4)); // 6 (應正常執行，忽略多餘參數)

    // 4. this 綁定測試
    const objB = {
        base: 10,
        add(a, b) { return this.base + a + b }
    };
    objB.curriedAdd = curry(objB.add);
    console.log('13 (應正確讀取 this.base) ===>> ', objB.curriedAdd(1)(2)); // 13 (應正確讀取 this.base)
