<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Poll</title>
</head>
<body>
<script>
    // 每 3 秒輪詢一次
    // 單次請求失敗可重試
    // 單次請求超時也算一次失敗，繼續重試
    // 從開始算起，整體超過 10 秒就直接失敗
    
    function poll(fn, options) {
        const interval = options?.interval || 3000; // 每次失敗後，3 秒再試
        const baseTimeout = options?.baseTimeout || 2000; // 單次請求超時
        const maxTimeout = options?.maxTimeout || 10000;  // 整體 10 秒失敗

        const start = performance.now();

        return new Promise((resolve, reject) => {
            function requestWithTimeout() {
                return Promise.race([
                    fn(),
                    new Promise((_, reject) => {
                        setTimeout(() => {
                            reject(new Error('單次請求超時'));
                        }, baseTimeout);
                    })
                ]);
            }

            function run() {
                if (performance.now() - start >= maxTimeout) {
                    reject(new Error('整體 10 秒失敗'));
                    return;
                }

                requestWithTimeout()
                    .then((res) => {
                        resolve(res);
                    })
                    .catch(() => {
                        if (performance.now() - start >= maxTimeout) {
                            reject(new Error('整體 10 秒失敗'));
                            return;
                        }

                        setTimeout(() => {
                            run();
                        }, interval);
                    });
            }

            run();
        });
    }

    let count = 0;

    function mockApi() {
        return new Promise((resolve, reject) => {
            count++;
            console.log('第 ' + count + ' 次請求');

            setTimeout(() => {
                if (count < 3) {
                    reject(new Error('失敗'));
                } else {
                    resolve('成功');
                }
            }, 1000);
        });
    }

    poll(mockApi)
        .then((res) => {
            console.log('✅', res);
        })
        .catch((err) => {
            console.log('❌', err.message);
        });
</script>
</body>
</html>
