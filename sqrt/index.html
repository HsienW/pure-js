<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Sqrt</title>
</head>
<body>
<script>
    function mySqrt(x) {
        if (x < 0) {
            throw new Error('負數沒有實數平方根');
        }

        if (x === 0 || x === 1) {
            return x;
        }

        let left = 0;
        let right = x < 1 ? 1 : x;
        const eps = 1e-7;

        for (let i = 0; i < 100; i++) {
            const mid = (left + right) / 2;
            const square = mid * mid;

            if (Math.abs(square - x) < eps) {
                return mid;
            }

            if (square < x) {
                left = mid;
            } else {
                right = mid;
            }
        }

        return (left + right) / 2;
    }

    // test
    function test(input, expected) {
        const actual = mySqrt(input);
        const ok = Math.abs(actual - expected) < 1e-5;

        console.log(
            `${ok ? '✅' : '❌'} mySqrt(${input}) = ${actual}, 預期 = ${expected}`
        );
    }

    test(4, 2);
    test(8, 2.8284271247461903);
    test(9, 3);
    test(0.25, 0.5);
    test(2, 1.4142135623730951);
</script>
</body>
</html>
