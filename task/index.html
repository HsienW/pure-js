<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Task</title>
</head>
<body>
<script>

    const Scheduler = {
        idle(fn) {
            if (typeof requestIdleCallback === 'function') {
                requestIdleCallback(fn, {timeout: 200});
            } else {
                setTimeout(fn, 0);
            }
        },
        now() {
            return (typeof performance !== 'undefined' && performance.now) ? performance.now() : new Date.now();
        }
    }

    class TaskQueue {
        constructor(ms, scheduler) {
            this.ms = ms;
            this.scheduler = scheduler;
            this.queue = [];
            this.running = false;
        }

        push(fn) {
            this.queue.push(fn);
            this.check();
        }

        check() {
            if (this.running) {
                return;
            }

            this.running = true;
            this.scheduler.idle(() => this.run());
        }

        async run() {
            const start = this.scheduler.now();
            const deadline = start + this.ms;

            while (this.queue.length > 0) {
                if (this.scheduler.now() > deadline) {
                    break;
                }

                const task = this.queue[0];

                try {
                    const done = await task();

                    if (done) {
                        this.queue.shift();
                    }
                } catch (e) {
                    console.log('e');
                    this.queue.shift();
                }
            }

            if (this.queue.length > 0) {
                this.scheduler.idle(() => this.run());
            } else {
                this.running = false;
            }
        }
    }

    /**
     * 輔助函數：模擬耗時任務
     */
    const sleepSync = (ms) => {
        const start = performance.now();
        while (performance.now() - start < ms) {
        }
    };

    /**
     * 測試案例 1: 基礎同步任務
     */
    async function testBasicSync() {
        console.log('--- Test 1: 基礎同步任務 ---');
        const tq = new TaskQueue(10, Scheduler);
        let count = 0;

        tq.push(() => {
            console.log('Task 1 Executed');
            count++;
            return true;
        });
        tq.push(() => {
            console.log('Task 2 Executed');
            count++;
            return true;
        });
        tq.push(() => {
            console.log('Task 3 Executed');
            count++;
            return true;
        });

        // 等待一個 tick 確保執行完畢
        await new Promise(r => setTimeout(r, 50));
        if (count === 3) console.log('✅ Test 1 Passed: Tasks executed in order.');
    }

    /**
     * 測試案例 2: 時間分片壓力測試 (Time Slicing)
     */
    async function testTimeSlicing() {
        console.log('\n--- Test 2: 時間分片壓力測試 (Time Slicing) ---');
        // 給予 4ms 寬裕時間，但每個任務耗時 1.5ms
        const tqHeavy = new TaskQueue(4, Scheduler);
        let completed = 0;
        const totalTasks = 10;

        for (let i = 0; i < totalTasks; i++) {
            tqHeavy.push(() => {
                sleepSync(1.5); // 模擬耗時操作
                completed++;
                console.log(`[Batch] Heavy Task ${i} done at ${Math.round(performance.now())}ms`);
                return true;
            });
        }

        await new Promise(r => setTimeout(r, 200));
        if (completed === totalTasks) {
            console.log(`✅ Test 2 Passed: All ${totalTasks} heavy tasks completed without blocking UI.`);
        }
    }

    /**
     * 測試案例 3: 異步任務與部分進度保持
     */
    async function testAsyncAndPartial() {
        console.log('\n--- Test 3: 異步任務與部分進度保持 ---');
        const tqAsync = new TaskQueue(50, Scheduler);
        let progress = 0;
        let isAsyncDone = false;

        // 1. 異步任務
        tqAsync.push(async () => {
            console.log('Async task: fetching data...');
            await new Promise(resolve => setTimeout(resolve, 100));
            console.log('Async task: completed! ✅');
            isAsyncDone = true;
            return true;
        });

        // 2. 需要多次執行才能完成的任務 (Partial Progress)
        tqAsync.push(() => {
            progress++;
            console.log(`Incremental task progress: ${progress}/3`);
            if (progress < 3) return false; // 尚未完成，下一輪繼續
            return true;
        });

        await new Promise(r => setTimeout(r, 300));
        if (isAsyncDone && progress === 3) {
            console.log('✅ Test 3 Passed: Async handled and partial task re-run correctly.');
        }
    }

    /**
     * 測試案例 4: 容錯性測試 (Resilience)
     * 驗證單一任務崩潰時，隊列是否能繼續執行後續任務
     */
    async function testResilience() {
        console.log('\n--- Test 4: 容錯性測試 ---');
        const tqError = new TaskQueue(10, Scheduler);
        let successCount = 0;
        let errorCaught = false;

        // 1. 正常任務
        tqError.push(() => {
            console.log('Task A: I am a good task');
            successCount++;
            return true;
        });

        // 2. 會拋出異常的任務
        tqError.push(() => {
            console.log('Task B: I am going to crash...');
            throw new Error('Boom!');
        });

        // 3. 在異常之後的任務
        tqError.push(() => {
            console.log('Task C: I survived! (The queue still works)');
            successCount++;
            return true;
        });

        // 給予足夠時間執行（考慮到 Error 可能會被 Scheduler 捕捉或拋出）
        await new Promise(r => setTimeout(r, 100));

        if (successCount === 2) {
            console.log('✅ Test 4 Passed: Queue continued despite a task failure.');
        } else {
            console.log('❌ Test 4 Failed: Queue stopped after error.');
        }
    }

    // 執行所有測試
    async function runTests() {
        await testBasicSync();
        await testTimeSlicing();
        await testAsyncAndPartial();
        await testResilience();
        console.log('\n--- All Tests Completed ---');
    }


    runTests();
</script>
</body>
</html>
