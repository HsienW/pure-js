<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Debounce</title>
</head>
<body>
<input type="button" value="click">
<script>
    const debounce2 = function (cb, delay, options = {leading: true, trailing: false}) {
        let timer = null;

        return function (...args) {
            const self = this;
            const isCallNow = !timer && options.leading

            if (timer) {
                clearTimeout(timer);
            }

            timer = setTimeout(function () {
                if (options.trailing !== false && !isCallNow) {
                    cb.apply(self, args);
                }
                timer = null;
            }, delay)


            if (isCallNow) {
                cb.apply(self, args);
            }
        }
    }

    const debounce = function (cb, delay) {
        let timer = null;

        return function (...args) {
            const self = this;

            clearTimeout(timer);

            timer = setTimeout(function () {
                cb.apply(self, args);
            }, delay)
        }
    }

    const button = document.querySelector('input');
    const test = function () {
        console.log('123');
    }

    button.addEventListener('click', debounce2(test, 2000));
</script>
</body>
</html>
