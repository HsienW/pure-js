<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>decodeStr</title>
</head>
<body>
<script>
    // 实现一个方法 decodeStr，输入一个字符串，根据约定规则输出编码结果。约定规则如下：
    // str = "2[a]1[bc]", 返回 "aabc".
    // str = "2[e2[d]]", 返回 "eddedd".
    // str = "3[abc]2[cd]ff", 返回 "abcabcabccdcdff".
    // 可以看出: N[string]，表示string 正好重复 N 次。假设字符串一定是有效正确的字符串

    // 利用棧來做
    // 1. 遍历输入字符串的每个字符。
    // 2. 如果当前字符不是 ']'，则将其压入栈中。
    // 3. 如果当前字符是 ']'，则开始解码过程。
    // 4. 从栈中弹出字符，直到遇到 '['。这些字符构成了要重复的字符串。
    // 5. 继续从栈中弹出字符，直到遇到一个数字。这个数字表示要重复的次数。
    // 6. 将重复次数和重复的字符串拼接起来，并将结果压回栈中。
    // 7. 最后，栈中剩余的字符组成了最终的解码结果

    function decodeStr(str) {
        const stack = [];

        for (let char of str) {
            if (char !== ']') {
                stack.push(char);
            } else {
                let curr = stack.pop();
                let encodedStr = '';

                while (curr !== '[') {
                    encodedStr = curr + encodedStr;
                    curr = stack.pop();
                }

                let num = '';
                curr = stack.pop();

                while (!isNaN(curr)) {
                    num = curr + num;
                    curr = stack.pop();
                }

                stack.push(curr);
                stack.push(encodedStr.repeat(Number(num)));
            }
        }

        return stack.join('');
    }

    const testCases = [
        { input: "2[a]1[bc]", expected: "aabc" },
        { input: "2[e2[d]]", expected: "eddedd" },
        { input: "3[abc]2[cd]ff", expected: "abcabcabccdcdff" },
        { input: "10[a]", expected: "aaaaaaaaaa" }, // 測試多位數
        { input: "2[3[a]2[b]]", expected: "aaabbaaabb" }, // 測試深層嵌套
        { input: "abc3[cd]xyz", expected: "abccdcdcdxyz" } // 測試括號外字元
    ];

    testCases.forEach(({ input, expected }, index) => {
        const result = decodeStr(input);
        const passed = result === expected;
        console.log(`Test ${index + 1}: ${passed ? '✅ PASSED' : '❌ FAILED'}`);
        if (!passed) console.log(`   Input: ${input}\n   Expected: ${expected}\n   Got: ${result}`);
    });


    // Base62 字符表（0-9a-zA-Z）
    const ALPHABET = "0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const BASE = ALPHABET.length;

    const idToUrl = new Map();   // 存儲：ID -> 長網址
    const codeToUrl = new Map(); // 存儲：短碼 -> 長網址 (優化：直接存網址更直觀)
    let autoInc = 1;             // 使用一般的 Number 即可處理到 2^53 - 1

    function encodeId(id) {
        let n = id;
        let s = "";

        // 如果 id 為 0 的處理
        if (n === 0) return ALPHABET[0];

        // 常見的進位制轉換寫法
        while (n > 0) {
            s = ALPHABET[n % BASE] + s;
            n = Math.floor(n / BASE);
        }

        return s;
    }

    const encode = function(longUrl) {
        // 這裡我們直接用自增 ID
        const id = autoInc++;
        const code = encodeId(id);

        // 實務上通常直接建立 code 到 longUrl 的映射，省去中間查找
        codeToUrl.set(code, longUrl);

        return "http://demo.com/" + code;
    };

    const decode = function(shortUrl) {
        // 使用 split 拿取最後一段短碼
        const parts = shortUrl.split("/");
        const code = parts[parts.length - 1];

        // 使用 || 代替 ??，在處理網址字串時更常見
        return codeToUrl.get(code) || null;
    };

</script>
</body>
</html>
